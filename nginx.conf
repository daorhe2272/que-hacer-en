events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;

    # Forward /api/* to Express
    location /api/ {
      proxy_pass http://127.0.0.1:4001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Next.js static assets directly from disk (standalone doesn't serve these)
    location /_next/static/ {
      alias /app/packages/web/packages/web/.next/static/;
      expires 1y;
      access_log off;
    }

    # Serve public assets directly from disk
    location /public/ {
      alias /app/packages/web/packages/web/public/;
      expires 1y;
      access_log off;
    }

    # Forward everything else to Next.js
    location / {
      proxy_pass http://127.0.0.1:4000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}