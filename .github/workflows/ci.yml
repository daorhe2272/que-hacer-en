name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: us-east4-docker.pkg.dev/que-hay-pa-hacer-498202/que-hay-pa-hacer/pa-hacer

jobs:
  lint:
    name: Lint (web + api)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm --filter @que-hacer-en/web run lint

      - name: Lint api
        run: pnpm --filter @que-hacer-en/api run lint

  test_api:
    name: Unit Tests (api)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @que-hacer-en/shared run build

      - name: Test api (coverage)
        run: pnpm --filter @que-hacer-en/api run test:coverage

      - name: Upload coverage artifact (api)
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: packages/api/coverage
          if-no-files-found: error
          retention-days: 7

  build:
    name: Build (web + api)
    runs-on: ubuntu-latest
    needs: [lint, test_api]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @que-hacer-en/shared run build

      - name: Build api
        run: pnpm --filter @que-hacer-en/api run build

      - name: Build web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm --filter @que-hacer-en/web run build

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEB_URL=${{ secrets.NEXT_PUBLIC_WEB_URL }}

      - name: Test Docker image
        run: |
          docker run --rm -d -p 8080:8080 \
            -e DATABASE_URL="mock://test" \
            -e NEXT_PUBLIC_SUPABASE_URL="https://test.supabase.co" \
            -e NEXT_PUBLIC_SUPABASE_ANON_KEY="test-key" \
            --name test-container \
            ${{ env.IMAGE }}:latest

          # Wait for both services to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health > /dev/null && curl -sf http://localhost:8080 > /dev/null; then
              echo "Both services ready"
              break
            fi
            echo "Waiting for services... attempt $i"
            sleep 3
          done

          docker logs test-container
          docker stop test-container

          curl -f http://localhost:8080/api/health || exit 1
          curl -f http://localhost:8080 || exit 1

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: pa-hacer
          region: us-east4
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
            API_PORT=4001
            WEB_PORT=4000